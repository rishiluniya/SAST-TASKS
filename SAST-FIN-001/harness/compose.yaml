version: "3.8"

services:
  default:
    build:
      context: ../
      dockerfile: Dockerfile
    image: sast-fin-001:latest
    working_dir: /task
    command: ["sleep", "infinity"]
    network_mode: "none"
    read_only: true
    tmpfs:
      - /tmp:size=128M,mode=1777
      - /task/output:size=64M,mode=0777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 2g
    cpus: 2.0
