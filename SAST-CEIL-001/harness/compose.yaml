services:
  default:
    build:
      context: ..
      dockerfile: Dockerfile
    image: sast-ceil-001-sandbox:latest
    network_mode: none
    read_only: true
    tmpfs:
      - /tmp:size=128m
      - /task/output:size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
